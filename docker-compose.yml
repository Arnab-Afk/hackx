services:
  postgres:
    image: postgres:16-alpine
    network_mode: host
    environment:
      POSTGRES_USER: zkloud
      POSTGRES_PASSWORD: zkloud
      POSTGRES_DB: zkloud
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zkloud"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      network: host
    network_mode: host
    env_file:
      - .env
    environment:
      PORT: "8081"
      # With host networking, postgres is reachable on localhost
      DATABASE_URL: postgres://hackx:hackx@localhost:5433/hackx?sslmode=disable
      PROXY_URL: http://localhost:8082
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /vm-storage:/vm-storage  # same path inside container as on host — Docker daemon resolves bind-mount paths on the host
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
