version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    network_mode: host
    environment:
      POSTGRES_USER: zkloud
      POSTGRES_PASSWORD: zkloud
      POSTGRES_DB: zkloud
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zkloud"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      network: host
    network_mode: host
    environment:
      PORT: "8081"
      # With host networking, postgres is reachable on localhost
      DATABASE_URL: postgres://zkloud:zkloud@localhost:5432/zkloud?sslmode=disable
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
